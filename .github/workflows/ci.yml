name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (lint, typecheck, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "server/uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: server
        run: uv sync --all-extras

      - name: Lint (ruff)
        working-directory: server
        run: uv run ruff check .

      - name: Format check (ruff)
        working-directory: server
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        working-directory: server
        run: uv run mypy app

      - name: Run tests
        working-directory: server
        env:
          DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app_test
          DATABASE_URL_SYNC: postgresql+psycopg://app:app@localhost:5432/app_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333
          OPENAI_API_KEY: sk-test-not-real
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_ENDPOINT_URL: http://localhost:9000
          APP_ENV: test
          CONFIG_DIR: ${{ github.workspace }}/configs
        run: uv run pytest -v

  client:
    name: Client (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Bun 1.2+ ships a Node 24 compat layer; Vite 8 requires Node >=22.12.
          bun-version: "1.2"

      - name: Install dependencies
        working-directory: client
        # No --frozen-lockfile until we commit a bun.lock from a clean install.
        run: bun install

      - name: Lint (Biome)
        working-directory: client
        run: bunx biome check .

      - name: Lint (ESLint react-hooks)
        working-directory: client
        run: bunx eslint .

      - name: Typecheck (tsc)
        working-directory: client
        run: bunx tsc --noEmit

      - name: Test (Vitest)
        working-directory: client
        # `bun test` runs Bun's own test runner — we want vitest, which is the
        # `test` script in package.json.
        run: bun run test

      - name: Build
        working-directory: client
        run: bun run build
