# Base compose file. Defines the stateful services used in BOTH dev and prod.
# Run together with docker-compose.dev.yml or docker-compose.prod.yml — see justfile.
#
# Versions are pinned intentionally. `latest` causes silent breakage on rebuilds.

name: data-platform

services:
  postgres:
    image: postgres:16-bookworm
    container_name: dp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run ONCE on first start. Creates the dagster database so
      # Dagster's run/event/schedule storage is isolated from the app schema.
      - ./configs/infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: dp-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: dp-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  minio:
    # S3-compatible object storage. The object store in every environment —
    # there is no AWS S3 fallback path. Pin the version — `latest` makes ops
    # debugging miserable.
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: dp-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      # /minio/health/live is the canonical liveness probe and works without auth.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  minio-init:
    # One-shot job that creates the buckets the app expects. Re-running it is
    # cheap and idempotent (`mc mb -p` ignores existing buckets).
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: dp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb -p local/documents &&
        mc mb -p local/artifacts &&
        echo 'minio buckets ready' &&
        exit 0
      "
    networks:
      - backend
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  monitoring:
    driver: bridge
