# Celery configuration. Loaded into the celery app via app/workers/celery_app.py.
# Broker and result backend URLs are taken from environment variables (REDIS_URL,
# DATABASE_URL) — they are secrets and live in configs/env/.env.*.

celery:
  # Result backend uses Postgres via SQLAlchemy result backend
  # (db+postgresql://...). Configured at runtime from DATABASE_URL.
  result_backend_table: "celery_taskmeta"
  result_expires_seconds: 86400      # 1 day. Old results are GC'd.
  task_track_started: true
  task_acks_late: true               # Tasks are ack'd only after success — survives worker crash.
  task_reject_on_worker_lost: true
  worker_prefetch_multiplier: 1      # Don't prefetch — important for fairness with long-running tasks.
  worker_max_tasks_per_child: 100    # Recycle workers periodically to bound memory growth.

  queues:
    # Queue routing. Each queue maps to a worker pool with its own concurrency.
    default:
      exchange: default
      routing_key: default
    ingestion:
      exchange: ingestion
      routing_key: ingestion
    pipelines:
      exchange: pipelines
      routing_key: pipelines
    embeddings:
      exchange: embeddings
      routing_key: embeddings

  routes:
    # Tasks routed by name pattern. See app/workers/tasks/*.py.
    "app.workers.tasks.ingest.*":
      queue: ingestion
    "app.workers.tasks.pipelines.*":
      queue: pipelines
    "app.workers.tasks.embeddings.*":
      queue: embeddings

  retry:
    # Default retry policy. Override per-task with task decorator kwargs.
    max_retries: 3
    default_retry_delay_seconds: 60
    retry_backoff: true
    retry_backoff_max_seconds: 600
    retry_jitter: true
