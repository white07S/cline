server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape every container's stdout/stderr via the docker driver.
  # The api/worker write structlog JSONL — promtail labels them by service.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
    pipeline_stages:
      # If the line is JSON (structlog JSONL output), extract trace_id and level.
      - json:
          expressions:
            level: level
            trace_id: trace_id
            logger: logger
      - labels:
          level:
          logger:
