global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: data-platform

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI — exposed by prometheus-fastapi-instrumentator at /metrics.
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Dagster webserver metrics (Dagster ships Prometheus metrics on the
  # webserver process). Dagster-daemon does not expose /metrics today.
  - job_name: dagster-webserver
    metrics_path: /metrics
    static_configs:
      - targets: ["dagster-webserver:3000"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
