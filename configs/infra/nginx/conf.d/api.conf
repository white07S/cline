# Upstream — docker-compose.prod.yml runs N replicas of `api`.
# Docker DNS resolves `api` to all replica IPs; nginx round-robins.
upstream api_backend {
    server api:8000;
    keepalive 32;
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # TLS certs are mounted from configs/infra/nginx/certs/ — provide your own.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Generate a request ID if the client didn't supply one. The api reads
    # this header via asgi-correlation-id middleware.
    set $req_id $http_x_request_id;
    if ($req_id = "") {
        set $req_id $request_id;
    }

    # Static client (built by client-build container, mounted as a volume).
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let TanStack Router handle deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy.
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $req_id;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE: disable buffering so streamed tokens flush immediately.
        proxy_buffering off;
        proxy_cache off;
    }

    # Health probe (cheap, no auth).
    location = /healthz {
        proxy_pass http://api_backend/api/v1/healthz;
        access_log off;
    }
}
