# Dev-only overlay. Adds api / dagster / client with hot reload + dev tooling.
# Stateful services come from docker-compose.yml.
#
# Dagster runs as TWO long-lived processes that both load the same code location:
#   - dagster-webserver: HTTP UI + GraphQL
#   - dagster-daemon:   schedules, sensors, run queue, run launcher
# Both share state via Postgres (configs/dagster.yaml).

# Anchor block for everything that needs the same Dagster + app env. Anything
# that runs `dagster` CLI must have DAGSTER_HOME pointing at a writable dir
# that contains the instance dagster.yaml.
x-dagster-base: &dagster-base
  build:
    context: ./server
    dockerfile: Dockerfile
    target: dev
  environment:
    APP_ENV: dev
    CONFIG_DIR: /app/configs
    UV_PROJECT_ENVIRONMENT: /opt/venv
    DAGSTER_HOME: /app/dagster_home
  env_file:
    - configs/env/.env.dev
  volumes:
    - ./server:/app
    - ./configs:/app/configs:ro
    # configs/dagster.yaml is mounted as the single file Dagster looks for at
    # $DAGSTER_HOME/dagster.yaml. The named volume persists run logs.
    - ./configs/dagster.yaml:/app/dagster_home/dagster.yaml:ro
    - dagster-home:/app/dagster_home/storage
  networks:
    - backend

services:
  # Host ports use the 5xxxx range to avoid colliding with other dev stacks the
  # user might be running on the standard ports. Container-internal ports are
  # unchanged, so the api still connects via service names on default ports.
  postgres:
    ports:
      - "55432:5432"

  redis:
    ports:
      - "56379:6379"

  qdrant:
    ports:
      - "6333:6333"   # HTTP + dashboard
      - "6334:6334"   # gRPC

  minio:
    ports:
      - "19000:9000"  # S3 API
      - "19001:9001"  # web console

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    container_name: dp-api
    # --no-sync: the venv was baked at /opt/venv during the image build; do not try to
    # re-sync against the bind-mounted source (which has no .venv).
    command: ["uv", "run", "--no-sync", "uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      APP_ENV: dev
      CONFIG_DIR: /app/configs
      UV_PROJECT_ENVIRONMENT: /opt/venv
    env_file:
      - configs/env/.env.dev
    volumes:
      - ./server:/app
      - ./configs:/app/configs:ro
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend
      - frontend

  dagster-webserver:
    <<: *dagster-base
    container_name: dp-dagster-webserver
    command:
      - uv
      - run
      - --no-sync
      - dagster-webserver
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - -m
      - app.orchestration.definitions
    ports:
      - "13000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  dagster-daemon:
    <<: *dagster-base
    container_name: dp-dagster-daemon
    command:
      - uv
      - run
      - --no-sync
      - dagster-daemon
      - run
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  client:
    # Bun 1.2+ ships a Node 24 compat layer; Vite 8 requires Node >=22.12.
    image: oven/bun:1.2-debian
    container_name: dp-client
    working_dir: /app
    # Install if node_modules is empty, then start vite. The named volume persists
    # node_modules across restarts so the install only runs on first up / after wipe.
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules ] || [ -z "$$(ls -A node_modules 2>/dev/null)" ]; then
          echo "[client] installing dependencies..."
          bun install
        fi
        exec bun run dev --host 0.0.0.0
    volumes:
      - ./client:/app
      - client-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    networks:
      - frontend

volumes:
  client-node-modules:
  dagster-home:
